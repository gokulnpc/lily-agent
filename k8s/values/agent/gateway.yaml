# Namespace-specific values for the gateway in the `agent` namespace (dev).
# image.repository and image.tag are injected by `make deploy-gateway`.

ingress:
  enabled: true
  host: gateway.dev.lily-agent.com
  # certificateArn is injected by `make deploy-gateway` from terraform output —
  # the ARN embeds the account ID, which is never committed (CLAUDE.md).
  certificateArn: ""
  groupName: lily-dev
