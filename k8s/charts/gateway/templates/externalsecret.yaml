{{- if .Values.database.secretArn }}
# Syncs the RDS-managed Aurora master secret and composes LILY_DATABASE_URL with
# the non-secret host/db coordinates. No query string — the app appends its own
# connect options. ESO reads the secret with its own role; the gateway pod only
# mounts the synced k8s Secret (so the orchestrator role needs no SecretsManager).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "gateway.name" . }}-db
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.database.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "gateway.name" . }}-db
    template:
      engineVersion: v2
      data:
        LILY_DATABASE_URL: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.database.secretArn }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.database.secretArn }}
        property: password
{{- end }}
