# Defaults — environment-specific overrides live in k8s/values/<namespace>/gateway.yaml
replicaCount: 1

image:
  repository: "" # set by deploy (ECR URL)
  tag: ""        # set by deploy (git sha)
  pullPolicy: IfNotPresent

containerPort: 8000

serviceAccount:
  create: true
  # IRSA role ARN once the gateway needs AWS access (Phase 2). Empty = no annotation.
  roleArn: ""

# Orchestrator runtime config. Account-bearing / endpoint values inject at deploy
# (never committed); guardrailId is a resource id (not an account id).
config:
  awsRegion: us-east-1
  redisUrl: "redis://redis:6379/0"
  opensearchEndpoint: "" # injected at deploy
  guardrailId: ""        # injected at deploy (Bedrock guardrail id)
  guardrailVersion: "DRAFT"
  # OTLP trace export (Phase 4). Empty ⇒ no exporter (setup_tracing is env-gated);
  # set to the in-cluster Jaeger OTLP HTTP receiver to light up end-to-end traces.
  otelEndpoint: ""

# ESO composes LILY_DATABASE_URL from the RDS-managed secret + these coordinates
# (secretArn/host injected at deploy). Empty secretArn ⇒ no ExternalSecret (the
# Phase-0 health stub needed no DB).
database:
  secretArn: ""
  host: ""
  port: 5432
  name: lily
  clusterSecretStore: aws-secrets-manager

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    memory: 1Gi

# App workloads run on the spot pool (D17).
nodeSelector:
  role: stateless

ingress:
  enabled: true
  host: ""           # e.g. gateway.dev.example.dev
  certificateArn: "" # ACM cert from the infra stack
  groupName: lily-dev
