# Syncs the RDS-managed Aurora master secret (username/password) from Secrets
# Manager and composes LILY_DATABASE_URL with the non-secret host/db coordinates.
# No query string on the URL — seed_crawl._db() appends ?connect_timeout=30.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "etl-crawl.name" . }}-db
  labels:
    {{- include "etl-crawl.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.database.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "etl-crawl.name" . }}-db
    template:
      engineVersion: v2
      data:
        LILY_DATABASE_URL: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.database.secretArn }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.database.secretArn }}
        property: password
